name: Build Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}
        cache: maven

    # --- TAHAP 1 & 2: BUILD, TESTING, DAN QUALITY INSPECTION (SONARCLOUD) ---
    - name: Build and analyze
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn clean verify sonar:sonar \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.organization=azkiyafnii-1 \
          -Dsonar.projectKey=azkiyafnii-1_TES-MKEPL-1 \
          -Dsonar.projectName=TES-MKEPL-1 \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
          -Dsonar.java.binaries=target/classes

    # --- TAHAP 3: CI/CD DEPLOYMENT (GITHUB PACKAGES) ---
    # Langkah ini hanya berjalan saat kamu membuat Release baru di GitHub
    - name: Verify settings.xml exists in .m2 directory
      if: github.event_name == 'release'
      run: ls -al ~/.m2

    - name: Publish to GitHub Packages Apache Maven
      if: github.event_name == 'release'
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
